<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>UMAP Explorer</title>

<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden; background: rgb(15,15,25); font-family: sans-serif;
  }
  #three-canvas {
    position: fixed; left: 0; top: 0; display: block;
  }
  #sidebar {
    position: fixed; top: 0; right: 0; bottom: 0; width: 270px;
    background: rgba(15,15,28,0.97); border-left: 1px solid rgba(255,255,255,0.08);
    display: flex; flex-direction: column; z-index: 1000; overflow: hidden;
  }
  #sidebar-search-wrap {
    padding: 10px 12px 8px; border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0;
  }
  #sidebar-search {
    width: 100%; box-sizing: border-box; padding: 6px 10px; border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.2); background: rgba(30,30,50,0.9);
    color: white; font-size: 12px; outline: none; margin-bottom: 6px;
  }
  #sidebar-search::placeholder { color: rgba(255,255,255,0.3); }
  #sidebar-search:focus { border-color: rgba(255,255,255,0.45); }
  #sidebar-btns { display: flex; gap: 5px; }
  .sb-btn {
    flex: 1; padding: 5px 2px; border-radius: 5px;
    border: 1px solid rgba(255,255,255,0.18); background: rgba(30,30,50,0.9);
    color: rgba(255,255,255,0.75); font-size: 10px; cursor: pointer;
    text-align: center; user-select: none;
  }
  .sb-btn:hover { background: rgba(255,255,255,0.1); }
  #sidebar-tree { flex: 1; overflow-y: auto; padding: 4px 0; }
  #sidebar-tree::-webkit-scrollbar { width: 4px; }
  #sidebar-tree::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }
  .group-row {
    display: flex; align-items: center; gap: 6px; padding: 6px 12px;
    cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.04); user-select: none;
  }
  .group-row:hover { background: rgba(255,255,255,0.05); }
  .group-chevron { font-size: 10px; color: rgba(255,255,255,0.4); width: 10px; flex-shrink: 0; }
  .group-eye, .cluster-eye {
    font-size: 12px; cursor: pointer; flex-shrink: 0;
    color: rgba(255,255,255,0.85); transition: color 0.15s;
  }
  .group-eye:hover, .cluster-eye:hover { color: white; }
  .group-eye.hidden, .cluster-eye.hidden { color: rgba(255,255,255,0.18); }
  .group-name {
    font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.9);
    flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    cursor: pointer;
  }
  .group-name:hover { color: white; }
  .group-name.highlighted { color: #f28e2b; }
  .group-count { font-size: 10px; color: rgba(255,255,255,0.3); flex-shrink: 0; }
  .cluster-list { display: none; }
  .cluster-list.open { display: block; }
  .cluster-row {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 12px 4px 28px; cursor: pointer;
  }
  .cluster-row:hover { background: rgba(255,255,255,0.04); }
  .cluster-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; opacity: 0.85; }
  .cluster-label {
    flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; overflow: hidden;
  }
  .cluster-name {
    font-size: 11px; color: rgba(255,255,255,0.72);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .cluster-name.highlighted { color: #f28e2b; font-weight: 600; }
  .cluster-size { font-size: 10px; color: rgba(255,255,255,0.28); }
  .match-hl { color: #f28e2b; font-weight: 700; }
  #hover-tip {
    position: fixed; pointer-events: none; z-index: 2000;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px; font-size: 12px;
    max-width: 360px; line-height: 1.55; display: none; word-wrap: break-word;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    white-space: normal; overflow: visible;
  }
  #hover-tip b { font-weight: 600; }
  #hover-tip i { font-style: normal; opacity: 0.65; }
  #hover-tip-arrow {
    position: absolute; left: -7px; top: 50%;
    transform: translateY(-50%);
    width: 0; height: 0;
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
    border-right: 7px solid transparent; /* filled by JS */
  }
  #hover-tip-inner {
    padding: 9px 11px;
    border-radius: 6px;
  }
  #progress-bar-wrap {
    position: fixed; bottom: 0; left: 0; right: 270px;
    height: 3px; background: rgba(255,255,255,0.08); z-index: 9999; display: none;
  }
  #progress-bar { height: 100%; width: 0%; background: #4e79a7; transition: width 0.15s; }
  #progress-label {
    position: fixed; bottom: 8px; left: 12px; font-size: 11px;
    color: rgba(255,255,255,0.4); z-index: 9999; display: none;
  }
  /* -- Floating controls -- */
  #float-controls {
    position: fixed; top: 12px; left: 12px; z-index: 500;
    display: flex; flex-direction: column; gap: 6px;
    user-select: none;
  }
  .fc-group {
    background: rgba(15,15,28,0.88); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 7px 9px;
    display: flex; flex-direction: column; gap: 5px;
    backdrop-filter: blur(6px);
  }
  .fc-row { display: flex; gap: 5px; align-items: center; }
  .fc-btn {
    padding: 4px 9px; border-radius: 5px; font-size: 10px; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.8); white-space: nowrap; transition: background 0.12s;
  }
  .fc-btn:hover { background: rgba(255,255,255,0.14); }
  .fc-btn.active { background: rgba(78,121,167,0.5); border-color: rgba(78,121,167,0.8); color: white; }
  .fc-label { font-size: 10px; color: rgba(255,255,255,0.4); min-width: 58px; }
  .fc-slider {
    -webkit-appearance: none; appearance: none;
    width: 90px; height: 3px; border-radius: 2px;
    background: rgba(255,255,255,0.18); outline: none; cursor: pointer;
  }
  .fc-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 11px; height: 11px;
    border-radius: 50%; background: rgba(255,255,255,0.85); cursor: pointer;
  }
  .fc-toggle-row { display: flex; gap: 4px; flex-wrap: wrap; }
  .fc-sep { height: 1px; background: rgba(255,255,255,0.08); margin: 3px 0; }
  .fc-val { font-size: 10px; color: rgba(255,255,255,0.55); min-width: 24px; text-align: right; font-family: sans-serif; }
</style>

</head>
<body>
<canvas id="three-canvas"></canvas>

<div id="hover-tip"><div id="hover-tip-arrow"></div><div id="hover-tip-inner"></div></div>
<div id="float-controls">
  <div class="fc-group">
    <div class="fc-row">
      <span class="fc-label">Point size</span>
      <input class="fc-slider" id="fc-size" type="range" min="1" max="40" value="4" step="1" style="flex:1;">
      <span class="fc-val" id="fc-size-val">4</span>
    </div>
    <div class="fc-sep"></div>
    <div class="fc-row"><span class="fc-label">Shading</span></div>
    <div class="fc-toggle-row">
      <div class="fc-btn" id="fc-outline">Outline</div>
      <div class="fc-btn" id="fc-rating">Rating &#9733;</div>
    </div>
    <div class="fc-sep"></div>
    <div class="fc-row">
      <span class="fc-label">Axes</span>
      <div class="fc-btn active" id="fc-axes-toggle">Visible</div>
    </div>
  </div>
  <div class="fc-group" id="fc-rating-panel">
    <div class="fc-row"><span class="fc-label" style="min-width:unset;color:rgba(255,255,255,0.6);">Rating filter</span></div>
    <div class="fc-row">
      <span class="fc-val" style="min-width:28px;" id="fc-rmin-val">0.0</span>
      <input class="fc-slider" id="fc-rmin" type="range" min="0" max="100" value="0"  step="1" style="flex:1;">
    </div>
    <div class="fc-row">
      <span class="fc-val" style="min-width:28px;" id="fc-rmax-val">5.0</span>
      <input class="fc-slider" id="fc-rmax" type="range" min="0" max="100" value="100" step="1" style="flex:1;">
    </div>
  </div>
  <div class="fc-group">
    <div class="fc-row" style="gap:4px;">
      <div class="fc-btn" id="fc-reset"  title="Reset camera">&#8635; Reset</div>
      <div class="fc-btn" id="fc-top"    title="Top view (X/Y)">Top</div>
      <div class="fc-btn" id="fc-front"  title="Front view (X/Z)">Front</div>
      <div class="fc-btn" id="fc-side"   title="Side view (Y/Z)">Side</div>
    </div>
    <div class="fc-row" style="font-size:9px;color:rgba(255,255,255,0.28);padding-top:1px;">
      Shift+drag to pan
    </div>
  </div>
</div>
<div id="sidebar">
  <div id="sidebar-search-wrap">
    <input id="sidebar-search" type="text" placeholder="Search clusters..." autocomplete="off" />
    <div id="sidebar-btns">
      <div class="sb-btn" id="sb-show-all">Show all</div>
      <div class="sb-btn" id="sb-clear-hl">Clear highlight</div>
    </div>
  </div>
  <div id="sidebar-tree"></div>
</div>
<div id="progress-bar-wrap"><div id="progress-bar"></div></div>
<div id="progress-label"></div>

    if (idx < 0) return text;
    return text.slice(0,idx) + '<span class="match-hl">' + text.slice(idx,idx+query.length) + '</span>' + text.slice(idx+query.length);

      const clusters = filter
        ? group.clusters.filter(c => c.name.toLowerCase().includes(filter.toLowerCase()))

        });

        row.appendChild(dot); row.appendChild(cEye); row.appendChild(label);
        clusterList.appendChild(row);
      });

      tree.appendChild(groupRow);
      tree.appendChild(clusterList);
    });
  }

  }
  const axisGroup = new THREE.Group();
  [0xe15759,0x59a14f,0x4e79a7].forEach((c,i)=>axisGroup.add(makeAxisLine(i,c)));
  scene.add(axisGroup);

  const LABEL_DATA = [
    {name:'UMAP 1',pos:new THREE.Vector3(AXIS_LEN+0.08,0,0),color:'#e15759'},
    {name:'UMAP 2',pos:new THREE.Vector3(0,AXIS_LEN+0.08,0),color:'#59a14f'},
    {name:'UMAP 3',pos:new THREE.Vector3(0,0,AXIS_LEN+0.08),color:'#4e79a7'},
  ];
  const labelDivs = LABEL_DATA.map(({name,color}) => {
    const d = document.createElement('div');
    d.textContent = name;
    d.style.cssText = 'position:fixed;font-size:11px;font-family:sans-serif;color:'+color+';opacity:0.75;pointer-events:none;z-index:500;';
    document.body.appendChild(d); return d;
  });
  let axesVisible = true;
  function setAxesVisible(v){axesVisible=v;axisGroup.visible=v;labelDivs.forEach(d=>{d.style.display=v?'block':'none';});}
  function updateLabels(){
    if(!axesVisible)return;
    LABEL_DATA.forEach(({pos},i)=>{
      const v=pos.clone().project(camera);
      labelDivs[i].style.left=((v.x*0.5+0.5)*W())+'px';
      labelDivs[i].style.top=((-v.y*0.5+0.5)*H())+'px';
      labelDivs[i].style.display=v.z>1?'none':'block';
    });
  }

  // -- Camera animation (spherical arc interpolation) --------------------------
  let camAnim=null;
  function animateCameraTo(toPos, toTarget, ms){
    const fp = camera.position.clone();
    const ft = controls.target.clone();
    const t0 = performance.now();

    const fromOffset = fp.clone().sub(ft);
    const toOffset   = toPos.clone().sub(toTarget);
    const fromDist   = fromOffset.length();
    const toDist     = toOffset.length();
    const fromDir    = fromOffset.clone().normalize();
    const toDir      = toOffset.clone().normalize();

    // Build rotation quaternion that takes fromDir -> toDir.
    // setFromUnitVectors is undefined when vectors are antiparallel (dot ~ -1).
    // Handle that by picking an arbitrary perpendicular axis for 180-degree rotation.
    const dot = fromDir.dot(toDir);
    let rotQ;
    if (dot < -0.9999) {
      // Antiparallel: choose perpendicular axis
      let perp = new THREE.Vector3(1,0,0);
      if (Math.abs(fromDir.x) > 0.9) perp.set(0,1,0);
      perp.crossVectors(perp, fromDir).normalize();
      rotQ = new THREE.Quaternion().setFromAxisAngle(perp, Math.PI);
    } else {
      rotQ = new THREE.Quaternion().setFromUnitVectors(fromDir, toDir);
    }

    // Identity quaternion (no rotation = start)
    const identQ = new THREE.Quaternion(); // (0,0,0,1)

    camAnim = now => {
      const t = Math.min((now - t0) / ms, 1);
      const e = t < 0.5 ? 2*t*t : -1+(4-2*t)*t; // ease in-out quad

      // Slerp rotation from identity -> rotQ, then apply to fromDir
      const q   = identQ.clone().slerp(rotQ, e);
      const dir = fromDir.clone().applyQuaternion(q);

      const dist   = fromDist + (toDist   - fromDist)   * e;
      const target = ft.clone().lerp(toTarget, e);

      camera.position.copy(target).addScaledVector(dir, dist);
      controls.target.copy(target);
      controls.update();
      return t < 1;
    };
  }

  // -- Render loop --------------------------------------------------------------
  (function animate(){
    requestAnimationFrame(animate);
    if(camAnim&&!camAnim(performance.now()))camAnim=null;
    controls.update();
    uniforms.uNear.value = camera.near;
    uniforms.uFar.value  = camera.position.distanceTo(controls.target)*2.5;
    renderer.render(scene,camera);
    updateLabels();
  })();

  // -- Highlight / visibility ---------------------------------------------------
  let traceVisible=null,highlightedSet=null;
  function applyColors(){
    const n=loaded;
    for(let i=0;i<n;i++){
      const t=traceArr[i],vis=!traceVisible||traceVisible[t];
      if(!vis){
        posAttr.array[i*3]=posAttr.array[i*3+1]=posAttr.array[i*3+2]=NaN;
        colArr[i*3]=colArr[i*3+1]=colArr[i*3+2]=0;
      } else {
        posAttr.array[i*3]=origPos[i*3];posAttr.array[i*3+1]=origPos[i*3+1];posAttr.array[i*3+2]=origPos[i*3+2];
        if(!highlightedSet||highlightedSet.has(t)){
          colArr[i*3]=baseR[i];colArr[i*3+1]=baseG[i];colArr[i*3+2]=baseB[i];
        } else {
          colArr[i*3]=baseR[i]*0.12+0.03;colArr[i*3+1]=baseG[i]*0.12+0.03;colArr[i*3+2]=baseB[i]*0.12+0.03;
        }
      }
    }
    posAttr.needsUpdate=true; colAttr.needsUpdate=true;
  }
  window.threeRedraw=(vis,hl)=>{traceVisible=vis;highlightedSet=hl;applyColors();};

  // -- Hover --------------------------------------------------------------------
  const raycaster=new THREE.Raycaster();
  const mouse=new THREE.Vector2();
  const tip=document.getElementById('hover-tip');
  const tipInner=document.getElementById('hover-tip-inner');
  const tipArrow=document.getElementById('hover-tip-arrow');
  let lastIdx=-1,hoverThrottled=false;

  function relativeLuminance(r,g,b){
    const lin=v=>v<=0.03928?v/12.92:Math.pow((v+0.055)/1.055,2.4);
    return 0.2126*lin(r)+0.7152*lin(g)+0.0722*lin(b);
  }
  function showTip(idx,mouseX,mouseY){
    const r=baseR[idx],g=baseG[idx],b=baseB[idx];
    const br=r*0.55,bg_=g*0.55,bb=b*0.55;
    const bgHex='rgb('+Math.round(br*255)+','+Math.round(bg_*255)+','+Math.round(bb*255)+')';
    const border='rgba('+Math.round(r*255)+','+Math.round(g*255)+','+Math.round(b*255)+',0.7)';
    const textColor=relativeLuminance(br,bg_,bb)>0.18?'rgba(0,0,0,0.88)':'rgba(255,255,255,0.92)';
    tip.style.background=bgHex; tip.style.borderColor=border;
    tipInner.style.color=textColor; tipArrow.style.borderRightColor=bgHex;
    tipInner.innerHTML=hoverArr[idx]||'(no data)'; tip.style.display='block';
    const vw=window.innerWidth-270,tipW=tip.offsetWidth||300,tipH=tip.offsetHeight||80;
    const tx=Math.min(mouseX+14,vw-tipW-8);
    const ty=Math.min(Math.max(mouseY-tipH/2,8),window.innerHeight-tipH-8);
    tip.style.left=tx+'px'; tip.style.top=ty+'px';
    const arrowY=Math.min(Math.max(mouseY-ty,10),tipH-10);
    tipArrow.style.top=arrowY+'px'; tipArrow.style.transform='translateY(-50%)';
  }

  renderer.domElement.addEventListener('mousemove',e=>{
    if(hoverThrottled)return; hoverThrottled=true;
    requestAnimationFrame(()=>{hoverThrottled=false;});
    const rc=renderer.domElement.getBoundingClientRect();
    mouse.x=((e.clientX-rc.left)/rc.width)*2-1;
    mouse.y=-((e.clientY-rc.top)/rc.height)*2+1;
    raycaster.setFromCamera(mouse,camera);
    const dist=camera.position.distanceTo(controls.target);
    raycaster.params.Points.threshold=Math.max(0.01,dist*0.02);
    const hits=raycaster.intersectObject(pointsMesh);
    if(hits.length>0){
      let bestIdx=-1,bestDist=Infinity;
      for(const hit of hits){
        const i=hit.index;
        if(isNaN(posAttr.array[i*3]))continue;
        const pt=new THREE.Vector3(posAttr.array[i*3],posAttr.array[i*3+1],posAttr.array[i*3+2]);
        const d=raycaster.ray.distanceToPoint(pt);
        if(d<bestDist){bestDist=d;bestIdx=i;}
      }
      if(bestIdx===-1){tip.style.display='none';lastIdx=-1;return;}
      lastIdx=bestIdx; showTip(bestIdx,e.clientX,e.clientY);
    } else {tip.style.display='none';lastIdx=-1;}
  });
  renderer.domElement.addEventListener('mouseleave',()=>{tip.style.display='none';lastIdx=-1;});

  // -- Floating controls wiring -------------------------------------------------
  const sizeSlider=document.getElementById('fc-size');
  const sizeVal=document.getElementById('fc-size-val');
  if(sizeSlider){
    sizeSlider.addEventListener('input',()=>{
      const v=parseFloat(sizeSlider.value);
      sizeVal.textContent=v; uniforms.uPointSize.value=v;
    });
  }
  const axesBtn=document.getElementById('fc-axes-toggle');
  if(axesBtn){
    axesBtn.addEventListener('click',()=>{
      setAxesVisible(!axesVisible);
      axesBtn.textContent=axesVisible?'Visible':'Hidden';
      axesBtn.classList.toggle('active',axesVisible);
    });
  }
  function wireToggle(id,key){
    const btn=document.getElementById(id); if(!btn)return;
    btn.addEventListener('click',()=>{
      const nowOn = uniforms[key].value < 0.5;
      uniforms[key].value = nowOn ? 1.0 : 0.0;
      btn.classList.toggle('active', nowOn);
    });
  }
  wireToggle('fc-outline','uOutline');
  wireToggle('fc-rating','uRatingShade');

  const rminSlider=document.getElementById('fc-rmin');
  const rmaxSlider=document.getElementById('fc-rmax');
  const rminVal=document.getElementById('fc-rmin-val');
  const rmaxVal=document.getElementById('fc-rmax-val');
  function updateRatingFilter(){
    const lo=parseFloat(rminSlider.value)/100,hi=parseFloat(rmaxSlider.value)/100;
    uniforms.uRatingMin.value=Math.min(lo,hi); uniforms.uRatingMax.value=Math.max(lo,hi);
    rminVal.textContent=(Math.min(lo,hi)*5).toFixed(1);
    rmaxVal.textContent=(Math.max(lo,hi)*5).toFixed(1);
  }
  if(rminSlider)rminSlider.addEventListener('input',updateRatingFilter);
  if(rmaxSlider)rmaxSlider.addEventListener('input',updateRatingFilter);

  const DIST=3.5,Z=new THREE.Vector3(0,0,0);
  const camPresets={
    'fc-reset':[DEFAULT_POS.clone(),DEFAULT_TARGET.clone()],
    'fc-top':[new THREE.Vector3(0,DIST,0.001),Z.clone()],
    'fc-front':[new THREE.Vector3(0,0.001,DIST),Z.clone()],
    'fc-side':[new THREE.Vector3(DIST,0.001,0),Z.clone()],
  };
  Object.entries(camPresets).forEach(([id,[pos,tgt]])=>{
    const btn=document.getElementById(id);
    if(btn)btn.addEventListener('click',()=>animateCameraTo(pos,tgt,600));
  });

  async function loadChunk(url) {
    const chunk = await fetch(url).then(r => r.json());
    const n = chunk.x.length;
    for (let i = 0; i < n; i++) {
      const p = loaded + i;
      posArr[p*3]   = origPos[p*3]   = chunk.x[i];
      posArr[p*3+1] = origPos[p*3+1] = chunk.y[i];
      posArr[p*3+2] = origPos[p*3+2] = chunk.z[i];
      const r = chunk.r[i]/255, g = chunk.g[i]/255, b = chunk.b[i]/255;
      colArr[p*3] = baseR[p] = r;
      colArr[p*3+1] = baseG[p] = g;
      colArr[p*3+2] = baseB[p] = b;
      ratArr[p]   = chunk.a != null ? chunk.a[i] : -1;
      traceArr[p] = chunk.t[i];
      hoverArr[p] = chunk.h[i];
    }
    loaded += n;
    posAttr.needsUpdate = true;
    colAttr.needsUpdate = true;
    ratAttr.needsUpdate = true;
    geometry.setDrawRange(0, loaded);
  }

  async function loadAll() {
    let done = 0;
    for (const f of CHUNK_FILES) {
      await loadChunk(f);
      done++;
      const pct = Math.round((done / N_CHUNKS) * 100);
      progressBar.style.width   = pct + '%';
      progressLabel.textContent = 'Loading ' + done + ' / ' + N_CHUNKS + ' (' + pct + '%)';
    }
    progressWrap.style.display  = 'none';
    progressLabel.style.display = 'none';
    initSidebar();
  }

  loadAll();
})();
</script>
